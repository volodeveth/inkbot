# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "InkBot — AI Product Descriptions & SEO"
handle = "inkbot"

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://inkbot.app/auth/callback",
  "https://inkbot.app/auth/shopify/callback",
  "https://inkbot.app/api/auth/callback"
]

[webhooks]
api_version = "2024-10"

[pos]
embedded = false
